apiVersion: v1
kind: Secret
metadata:
  name: {{ include "apiscope.fullname" . }}
  labels:
    {{- include "apiscope.labels" . | nindent 4 }}
type: Opaque
stringData:
  APISCOPE_CLICKHOUSE_USER: {{ .Values.secrets.clickhouseUser | quote }}
  APISCOPE_CLICKHOUSE_PASSWORD: {{ .Values.secrets.clickhousePassword | quote }}
  APISCOPE_SESSION_SECRET: {{ .Values.secrets.sessionSecret | quote }}
  APISCOPE_DASHBOARD_USER: {{ .Values.secrets.dashboardUser | quote }}
  APISCOPE_DASHBOARD_PASSWORD_HASH: {{ .Values.secrets.dashboardPasswordHash | quote }}
  {{- range $app, $token := .Values.secrets.ingestTokens }}
  APISCOPE_INGEST_TOKEN_{{ $app | upper }}: {{ $token | quote }}
  {{- end }}
